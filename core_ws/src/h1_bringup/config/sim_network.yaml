# Sim-only override: sets Unitree DDS domain to 1 to match h1_mujoco.
# Estop limits are loosened for sim — no risk of hardware damage.
mode: debug
network:
  domain_id: 1
limits:
  estop:
    position_offset: 0.1       # rad beyond joint limits before estop (default 0.01)
    velocity_ratio: 1.0        # fraction of max joint velocity (default 0.5)
    torque_ratio: 1.0          # fraction of max joint torque (default 0.5)

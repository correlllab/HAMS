services:
  isaac:
    profiles: [isaac]
    container_name: hams_sim_isaac
    build:
      context: ..
      dockerfile: docker/IsaacDockerfile
    image: hams_sim_isaac:latest
    runtime: nvidia
    privileged: true
    shm_size: 16g
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_INDIRECT=0
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-1}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
      - /dev/input:/dev/input:ro
      - /dev/dri:/dev/dri:rw
      - ../CL_Assets:/home/code/CL_Assets:ro
      - ./scripts:/home/code/h12_sim_scripts
      - ../CL_isaaclab_sim:/home/code/CL_isaaclab_sim
      - ../CL_isaaclab_sim/.isaac_cache/ov:/root/.cache/ov
      - ../CL_isaaclab_sim/.isaac_cache/nvidia:/root/.nv
      - ../CL_isaaclab_sim/.isaac_cache/local_share_ov:/root/.local/share/ov
      - ../CL_isaaclab_sim/.isaac_cache/isaacsim:/root/.isaacsim
    command: /home/code/h12_sim_scripts/launch_isaac.sh

  robocasa:
    profiles: [robocasa]
    container_name: hams_sim_robocasa
    build:
      context: ..
      dockerfile: docker/RobocasaDockerfile
    image: hams_sim_robocasa:latest
    runtime: nvidia
    privileged: true
    shm_size: 16g
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_INDIRECT=0
      # Default to GLFW (native passive viewer). Export MUJOCO_GL=egl on the
      # host (or pass --headless to launch_mujoco.sh) for offscreen rendering.
      - MUJOCO_GL=${MUJOCO_GL:-glfw}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-1}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
      - /dev/input:/dev/input:ro
      - /dev/dri:/dev/dri:rw
      - ../h1_robocasa:/home/code/h1_robocasa
      - ../CL_Assets:/home/code/CL_Assets:ro
      - ./scripts:/home/code/h12_sim_scripts
      # Only the message packages the magpi sim needs — keeps the rest of
      # core_ws (vision_pipeline weights, FAST_LIO, root-owned host build
      # dir, etc.) out of this container. The parent rw mount persists
      # build/install/log on the host under container_cache/msgs_ws/ so
      # colcon's incremental rebuild on launch is a near-no-op when the
      # IDL is unchanged; the two inner :ro mounts override their src/
      # subdirs so the package sources stay read-only.
      - ../container_cache/msgs_ws:/home/code/msgs_ws:rw
      - ../core_ws/src/magpie_msgs:/home/code/msgs_ws/src/magpie_msgs:ro
      - ../core_ws/src/custom_ros_messages:/home/code/msgs_ws/src/custom_ros_messages:ro
    command: /home/code/h12_sim_scripts/launch_robocasa.sh

  ros:
    profiles: [ros]
    container_name: hams_ros
    build:
      context: ..
      dockerfile: docker/RosDockerfile
    image: hams_ros:latest
    runtime: nvidia
    privileged: true
    shm_size: 4g
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-1}
      # Gemini API key for the vision pipeline's gemini backbone + h12_skills.
      # Passed through from the host shell: export GEMINI_API_KEY before running.
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # GraspGenX released checkpoints ship in the repo (git-LFS) and reach the
      # container via the core_ws bind mount below. The image's
      # GRASPGENX_CHECKPOINT_DIR defaults to an empty /opt staging dir, so point
      # it at the real weights here (runtime override, no rebuild needed).
      - GRASPGENX_CHECKPOINT_DIR=/home/code/core_ws/src/model_server/weights/graspgen
      # GraspGenX gripper assets root — the dir the magpie description is staged
      # into via the bind mounts below. graspgen_server requires this explicitly.
      - GRASPGENX_ASSETS_DIR=/opt/graspgenx/assets
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
      - ../core_ws:/home/code/core_ws
      - ../CL_Assets:/home/code/CL_Assets:ro
      # Stage the magpie GraspGenX gripper description into the (image-baked)
      # GraspGenX assets so gripper_name=magpie resolves. Mount the LEAF dirs only —
      # mounting all of assets/ would shadow the baked proc_grippers/ + sample_data/.
      # gripper.urdf references ../meshes/magpie/, so the meshes leaf is mounted at
      # x_grippers/meshes/magpie (one level up from the gripper dir).
      - ../CL_Assets/graspgenx/assets/magpie:/opt/graspgenx/assets/x_grippers/magpie:ro
      - ../CL_Assets/graspgenx/assets/meshes/magpie:/opt/graspgenx/assets/x_grippers/meshes/magpie:ro
      - ./scripts:/home/code/h12_sim_scripts
    command: /home/code/h12_sim_scripts/launch_ros.sh
